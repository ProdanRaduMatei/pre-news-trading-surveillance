name: Refresh Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Refresh mode
        required: true
        default: full
        type: choice
        options:
          - full
          - intraday
  schedule:
    - cron: "15 * * * 1-5"
    - cron: "25 22 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      PUBLISH_S3_BUCKET: ${{ secrets.PUBLISH_S3_BUCKET }}
      PUBLISH_S3_REGION: ${{ secrets.PUBLISH_S3_REGION }}
      PUBLISH_S3_ENDPOINT_URL: ${{ secrets.PUBLISH_S3_ENDPOINT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,publish,ml]

      - name: Determine refresh mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "25 22 * * 1-5" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=intraday" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scheduled refresh
        run: |
          pnts refresh-pipeline \
            --config configs/refresh_pipeline.example.toml \
            --mode "${{ steps.mode.outputs.mode }}"

      - name: Upload DuckDB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnts-duckdb-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: data/gold/pnts.duckdb
          if-no-files-found: ignore

      - name: Upload published snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnts-publish-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: data/publish/current
          if-no-files-found: ignore
